<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дневник трейдера | Успешный трейдер</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: #e0e0e0;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-text {
            font-size: 18px;
            font-weight: bold;
            color: #ffd966;
            letter-spacing: 1px;
        }
        .logo-sub {
            font-size: 12px;
            color: #888;
        }
        .card {
            background: #14161c;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2e3a;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0a0c10;
            border: 1px solid #2a2e3a;
            border-radius: 14px;
            color: #f1f5f9;
            font-size: 15px;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffd966;
            box-shadow: 0 0 0 2px rgba(255,217,102,0.2);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .row-2 {
            display: flex;
            gap: 12px;
        }
        .row-2 > * {
            flex: 1;
        }
        button {
            background: #ffd966;
            color: #0a0c10;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        button:active {
            transform: scale(0.97);
            background: #e0b843;
        }
        .result-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .result-btn {
            flex: 1;
            background: #2a2e3a;
            color: white;
        }
        .result-btn.plus.active {
            background: #2ecc71;
            color: white;
        }
        .result-btn.minus.active {
            background: #e74c3c;
            color: white;
        }
        .stats-grid {
            display: flex;
            justify-content: space-between;
            text-align: center;
            gap: 12px;
        }
        .stat-item {
            background: #0a0c10;
            padding: 12px;
            border-radius: 20px;
            flex: 1;
        }
        .stat-value {
            font-size: 26px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 11px;
            color: #aaa;
        }
        .winrate-bar {
            margin-top: 16px;
            height: 8px;
            background: #2a2e3a;
            border-radius: 4px;
            overflow: hidden;
        }
        .winrate-fill {
            height: 100%;
            width: 0%;
            background: #2ecc71;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .winrate-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 6px;
            color: #aaa;
        }
        .trade-item {
            background: #0a0c10;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .trade-info {
            flex: 1;
        }
        .trade-asset {
            font-weight: bold;
            font-size: 16px;
        }
        .trade-date {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }
        .trade-reason {
            font-size: 12px;
            color: #ccc;
            margin-top: 6px;
        }
        .trade-result {
            font-size: 24px;
            margin-right: 8px;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #e74c3c;
            width: auto;
            padding: 8px;
        }
        .delete-btn:active {
            transform: none;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #14161c;
            display: flex;
            padding: 8px 16px 16px;
            gap: 12px;
            border-top: 1px solid #2a2e3a;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #2a2e3a;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active {
            background: #ffd966;
            color: #0a0c10;
        }
        .hidden {
            display: none;
        }
        .plus-text { color: #2ecc71; }
        .minus-text { color: #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-text">УСПЕШНЫЙ ТРЕЙДЕР</div>
        <div class="logo-sub">Академия</div>
    </div>

    <div class="tab-bar">
        <div class="tab active" data-tab="form">➕ Новая сделка</div>
        <div class="tab" data-tab="stats">📊 Статистика</div>
        <div class="tab" data-tab="history">📋 История</div>
    </div>

    <div id="formTab" class="tab-content">
        <div class="card">
            <div class="card-title">📝 Запись сделки</div>
            <div class="row-2">
                <div class="form-group">
                    <label>Дата</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label>Время входа</label>
                    <input type="time" id="entry_time">
                </div>
            </div>
            <div class="form-group">
                <label>Актив (GBPUSD, BTCUSD...)</label>
                <input type="text" id="asset" placeholder="EURUSD">
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>Направление</label>
                    <select id="direction">
                        <option value="long">📈 Long (Buy)</option>
                        <option value="short">📉 Short (Sell)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Объём (лот)</label>
                    <input type="number" step="0.01" id="volume" value="0.01">
                </div>
            </div>
            <div class="form-group">
                <label>Риск (% депозита)</label>
                <input type="number" step="0.5" id="risk" value="1.0">
            </div>
            <div class="form-group">
                <label>Причина входа</label>
                <textarea id="entry_reason" placeholder="Пример: структура, пробой, коррекция, сила/слабость, зона..."></textarea>
            </div>
            <div class="form-group">
                <label>Комментарий после сделки</label>
                <textarea id="after_comment" placeholder="Что сработало? Что нет?"></textarea>
            </div>
            <div class="form-group">
                <label>Результат</label>
                <div class="result-buttons">
                    <button type="button" class="result-btn plus" data-result="plus">✅ Прибыль</button>
                    <button type="button" class="result-btn minus" data-result="minus">❌ Убыток</button>
                </div>
            </div>
            <button id="saveBtn">💾 Сохранить сделку</button>
        </div>
    </div>

    <div id="statsTab" class="tab-content hidden">
        <div class="card">
            <div class="card-title">📈 Моя статистика</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalTrades">0</div>
                    <div class="stat-label">Всего сделок</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="winrate">0%</div>
                    <div class="stat-label">Winrate</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="plusCount">0</div>
                    <div class="stat-label">✅ Прибыль</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="minusCount">0</div>
                    <div class="stat-label">❌ Убыток</div>
                </div>
            </div>
            <div class="winrate-bar">
                <div class="winrate-fill" id="winrateBar"></div>
            </div>
            <div class="winrate-labels">
                <span>Убытки</span>
                <span>Прибыль</span>
            </div>
        </div>
    </div>

    <div id="historyTab" class="tab-content hidden">
        <div class="card">
            <div class="card-title">📋 Последние сделки</div>
            <div id="tradesList">
                <div style="text-align:center; padding:20px;">Загрузка...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Получаем объект Telegram WebApp и данные авторизации
    let tg = window.Telegram?.WebApp;
    let initData = tg ? tg.initData : '';
    if (tg) {
        tg.expand();
        tg.enableClosingConfirmation();
    }

    // Универсальная функция для fetch с авторизацией
    async function authorizedFetch(url, options = {}) {
        const headers = options.headers || {};
        if (initData) {
            headers['Authorization'] = 'Bearer ' + initData;
        }
        options.headers = headers;
        return fetch(url, options);
    }

    let selectedResult = 'plus';
    document.querySelectorAll('.result-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedResult = this.getAttribute('data-result');
        });
    });
    document.querySelector('.result-btn.plus').classList.add('active');

    // Сохранение сделки
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const data = {
            date: document.getElementById('date').value,
            entry_time: document.getElementById('entry_time').value,
            asset: document.getElementById('asset').value,
            direction: document.getElementById('direction').value,
            volume: parseFloat(document.getElementById('volume').value),
            risk: parseFloat(document.getElementById('risk').value),
            entry_reason: document.getElementById('entry_reason').value,
            after_comment: document.getElementById('after_comment').value,
            result: selectedResult
        };
        if (!data.date || !data.entry_time || !data.asset) {
            alert('Заполните дату, время и актив');
            return;
        }
        try {
            const response = await authorizedFetch('/api/trades', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                alert('Сделка сохранена!');
                document.getElementById('entry_reason').value = '';
                document.getElementById('after_comment').value = '';
                loadStats();
                loadHistory();
            } else {
                const err = await response.json();
                alert('Ошибка: ' + (err.error || 'неизвестная'));
            }
        } catch (e) {
            alert('Ошибка сети: ' + e.message);
        }
    });

    async function loadStats() {
        try {
            const res = await authorizedFetch('/api/stats');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const stats = await res.json();
            document.getElementById('totalTrades').innerText = stats.total;
            document.getElementById('winrate').innerText = stats.winrate + '%';
            document.getElementById('plusCount').innerText = stats.plus;
            document.getElementById('minusCount').innerText = stats.minus;
            const total = stats.plus + stats.minus;
            const percent = total ? (stats.plus / total * 100) : 0;
            document.getElementById('winrateBar').style.width = percent + '%';
        } catch (e) {
            console.error('Stats error', e);
        }
    }

    async function loadHistory() {
        try {
            const res = await authorizedFetch('/api/trades');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const trades = await res.json();
            const container = document.getElementById('tradesList');
            if (trades.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Нет сделок</div>';
                return;
            }
            let html = '';
            trades.forEach(t => {
                const resultClass = t.result === 'plus' ? 'plus-text' : 'minus-text';
                const sign = t.result === 'plus' ? '✅' : '❌';
                html += `
                    <div class="trade-item" data-id="${t.id}">
                        <div class="trade-info">
                            <div class="trade-asset">${t.asset} (${t.direction === 'long' ? '📈 Long' : '📉 Short'})</div>
                            <div class="trade-date">${t.date} ${t.entry_time} | Объём: ${t.volume} | Риск: ${t.risk}%</div>
                            ${t.entry_reason ? `<div class="trade-reason">✍️ ${t.entry_reason}</div>` : ''}
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="trade-result ${resultClass}">${sign}</div>
                            <button class="delete-btn" data-id="${t.id}">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (e) {
            console.error('History error', e);
        }
    }

    // Удаление сделки
    document.addEventListener('click', async (e) => {
        if (e.target.classList.contains('delete-btn')) {
            const tradeId = e.target.getAttribute('data-id');
            if (confirm('Удалить эту сделку?')) {
                try {
                    const res = await authorizedFetch(`/api/trades/${tradeId}`, { method: 'DELETE' });
                    if (res.ok) {
                        loadHistory();
                        loadStats();
                    } else {
                        alert('Ошибка удаления');
                    }
                } catch (err) {
                    alert('Ошибка сети');
                }
            }
        }
    });

    // Переключение вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('formTab').classList.add('hidden');
            document.getElementById('statsTab').classList.add('hidden');
            document.getElementById('historyTab').classList.add('hidden');
            if (target === 'form') document.getElementById('formTab').classList.remove('hidden');
            if (target === 'stats') {
                document.getElementById('statsTab').classList.remove('hidden');
                loadStats();
            }
            if (target === 'history') {
                document.getElementById('historyTab').classList.remove('hidden');
                loadHistory();
            }
        });
    });

    // Инициализация
    loadStats();
    loadHistory();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
</script>
</body>
</html>
